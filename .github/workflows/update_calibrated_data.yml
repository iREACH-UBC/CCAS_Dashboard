name: Update Calibrated Sensor Data

on:
  workflow_run:
    workflows: ["Update Sensor Data"]
    types:
      - completed
  workflow_dispatch:

jobs:
  calibrate-ramp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "3.4.4"  # ⚠️ May not be available on GitHub runners

      - name: Install Python dependencies
        run: pip install pandas pytz

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("readr", "dplyr", "gtools", "randomForest"), repos = "https://cloud.r-project.org")'

      - name: Run calibration script
        run: python scripts/calibrate_data.py

      - name: Commit and push calibrated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add calibrated_data/*.csv
          git commit -m "Automated RAMP calibrated data update at $(date)" || echo "No changes to commit"
          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break
            sleep 5
          done

  calibrate-qaq:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.2"

      - name: Install Python dependencies
        run: pip install pandas pytz

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("readr", "dplyr", "gtools", "randomForest"), repos = "https://cloud.r-project.org")'

      - name: Run calibration script
        run: python scripts/calibrate_qaq.py

      - name: Commit and push calibrated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add calibrated_data/*.csv
          git commit -m "Automated QAQ calibrated data update at $(date)" || echo "No changes to commit"
          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break
            sleep 5
          done
